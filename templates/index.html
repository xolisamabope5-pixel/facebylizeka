<!DOCTYPE html>
<html>
<head>
    <title>FaceByLizeka Beauty Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: #111;
        }

        h1 {
            color: #d4af37;
        }

        .btn {
            background: #d4af37;
            color: black;
            padding: 10px 20px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        input, select, textarea {
            width: 90%;
            max-width: 400px;
            padding: 10px;
            margin: 8px;
        }

        button {
            background: #d4af37;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>FaceByLizeka Beauty Studio</h1>
    <p>Luxury makeup for weddings, events & photoshoots</p>

    <a class="btn" href="#book">Book Now</a>
    <a class="btn" href="/track">Track Booking</a>
    <a class="btn" href="/login">Admin</a>
</header>

<section id="book">
    <h2>Book Appointment</h2>

    <form method="POST" action="/book">
        <input name="name" placeholder="Your Name" required><br>
        <input name="phone" placeholder="Phone Number" required><br>

        <select name="service">
            <option>Bridal Glam</option>
            <option>Event Makeup</option>
            <option>Photoshoot Look</option>
        </select><br>

        <input type="date" name="date" required><br>
        <textarea name="message" placeholder="Message"></textarea><br>

        <button type="submit">Submit Booking</button>
    </form>
</section>

</body>
</html>
