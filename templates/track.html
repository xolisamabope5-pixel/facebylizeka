<!DOCTYPE html>
<html>
<head>
    <title>Track Booking</title>
</head>

<body style="background:#111; color:white; text-align:center;">

<h2 style="color:#d4af37;">Track Your Booking</h2>

<form method="POST">
    <input name="phone" placeholder="Enter your phone">
    <button>Track</button>
</form>

{% if bookings %}
    <h3>Results:</h3>

    {% for b in bookings %}
    <div style="border:1px solid #444; margin:10px; padding:10px;">
        <p>{{ b.service }} on {{ b.date }}</p>
        <p>Status: <b>{{ b.status }}</b></p>
    </div>
    {% endfor %}
{% endif %}

</body>
</html>
